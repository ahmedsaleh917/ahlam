<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <title>صفاء الروح - مستشارك لتفسير الأحلام</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #FFD700;
            --dark-bg: #111;
            --card-bg: #1b1b1b;
            --text-white: #ffffff;
            --font-family: 'Almarai', sans-serif;
        }

        html, body {
            margin: 0; padding: 0; height: 100dvh;
            background: var(--dark-bg); font-family: var(--font-family);
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* 🚫 شاشة انقطاع الإنترنت المخصصة */
        #offline-screen {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000;
            z-index: 10000; justify-content: center; align-items: center;
            flex-direction: column; text-align: center;
        }
        #offline-screen.active { display: flex; }
        .offline-msg { color: var(--gold); font-size: 22px; font-weight: 800; border: 2px solid var(--gold); padding: 20px; border-radius: 15px; }

        .صفاء-الروح-master-container {
            display: flex; flex-direction: column; height: 100%;
            max-width: 600px; margin: auto; width: 100%;
            background: var(--dark-bg); position: relative;
        }

        .صفاء-الروح-header {
            padding: 15px 20px; background: #1c1c1c;
            border-bottom: 1px solid rgba(255,215,0,0.15); flex-shrink: 0;
        }
        .profile-wrapper { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .profile-img-container { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; }
        .profile-img-container i { color: var(--gold); font-size: 24px; }
        .profile-name { color: var(--gold); font-weight: 800; font-size: 19px; }

        .صفاء-الروح-display-window {
            flex: 1; padding: 20px 15px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 18px;
        }
        .صفاء-الروح-response-card {
            background: #1b1b1b; border-radius: 18px; padding: 16px; 
            max-width: 90%; align-self: flex-start; border-right: 4px solid var(--gold);
            color: var(--text-white); animation: msgIn 0.3s ease;
        }
        .user-message { align-self: flex-end; background: #2c3e50; border-left: 4px solid #3498db; border-radius: 18px; padding: 14px; }

        .صفاء-الروح-control-panel { background: #1a1a1a; padding: 15px; border-top: 1px solid rgba(255,215,0,0.1); }
        #dreamInput {
            width: 100%; height: 60px; background: #0d0d0d; border: 1px solid #333; 
            border-radius: 12px; color: #fff; padding: 12px; font-family: var(--font-family);
            outline: none; resize: none; text-align: right;
        }
        .صفاء-الروح-main-btn {
            width: 100%; margin-top: 10px; padding: 15px; border-radius: 12px; border: none;
            font-weight: 800; background: var(--gold); color: #000; cursor: pointer;
        }

        .status-msg { color: var(--gold); font-size: 13px; display: none; text-align: center; margin-bottom: 5px; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .branding { text-align: center; margin-top: 10px; color: rgba(255,255,255,0.2); font-size: 10px; }
    </style>
</head>
<body>

    <div id="offline-screen">
        <div class="offline-msg">عذراً، أنت لست متصلاً بالإنترنت</div>
    </div>

    <div class="صفاء-الروح-master-container">
        <div class="صفاء-الروح-header">
            <div class="profile-wrapper">
                <div class="profile-img-container"><i class="fas fa-moon"></i></div>
                <div class="profile-info"><span class="profile-name">صفاء الروح</span></div>
            </div>
        </div>

        <div class="صفاء-الروح-display-window" id="sabriDisplay">
            <div class="صفاء-الروح-response-card">
                <p>أهلاً بك.. أنا متخصص في تفسير الأحلام وفك الرموز فقط. كيف يمكنني مساعدتك في رؤياك؟</p>
            </div>
        </div>

        <div class="صفاء-الروح-control-panel">
            <div id="typingStatus" class="status-msg"><i class="fas fa-pen-nib"></i> يتأمل صفاء الروح في الرموز...</div>
            <textarea id="dreamInput" placeholder="اسرد حلمك هنا..."></textarea>
            <button class="صفاء-الروح-main-btn" onclick="startInterpretation()">تفسير الرؤيا</button>
            <div class="branding">sabriFX &copy; 2026</div>
        </div>
    </div>

    <script>
        const display = document.getElementById('sabriDisplay');
        const input = document.getElementById('dreamInput');
        const offlineScreen = document.getElementById('offline-screen');

        // فحص حالة الاتصال
        function updateOnlineStatus() {
            if (!navigator.onLine) offlineScreen.classList.add('active');
            else offlineScreen.classList.remove('active');
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // كلمات دلالية للحلم
        function isDreamRelated(text) {
            const dreamKeywords = ['حلمت', 'رأيت', 'شفت', 'منام', 'رؤيا', 'تفسير', 'كابوس', 'رمز'];
            return dreamKeywords.some(key => text.includes(key)) || text.length > 20;
        }

        async function startInterpretation() {
            const text = input.value.trim();
            if (!text) return;

            // عرض رسالة المستخدم
            const uCard = document.createElement('div');
            uCard.className = 'صفاء-الروح-response-card user-message';
            uCard.innerHTML = `<p>${text}</p>`;
            display.appendChild(uCard);
            input.value = '';
            display.scrollTop = display.scrollHeight;

            // التحقق من التخصص
            if (!isDreamRelated(text)) {
                setTimeout(() => {
                    const rCard = document.createElement('div');
                    rCard.className = 'صفاء-الروح-response-card';
                    rCard.innerHTML = `<p>أعتذر منك، أنا متخصص في تفسير الأحلام وفك رموز الرؤى فقط، ولا يمكنني النقاش في مواضيع أخرى.</p>`;
                    display.appendChild(rCard);
                    display.scrollTop = display.scrollHeight;
                }, 500);
                return;
            }

            document.getElementById('typingStatus').style.display = 'block';

            try {
                const systemPrompt = `أنت "صفاء الروح"، خبير متخصص حصرياً في تفسير الأحلام وفك الرموز. 
                قواعدك: 
                1- لا تناقش أي موضوع خارج تفسير الأحلام. 
                2- إذا سألك المستخدم عن شيء غير الحلم، اعتذر بأدب ووضح تخصصك. 
                3- الرد بالعربية الفصحى فقط وبدون إنجليزية.
                4- ميز جنس المستخدم من السرد (يا أخي/يا أختي).`;

                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(systemPrompt + " الحلم: " + text)}?model=openai`);
                const result = await res.text();

                document.getElementById('typingStatus').style.display = 'none';
                const rCard = document.createElement('div');
                rCard.className = 'صفاء-الروح-response-card';
                rCard.innerHTML = `<p id="typing"></p>`;
                display.appendChild(rCard);

                let i = 0;
                const target = rCard.querySelector('#typing');
                function type() {
                    if (i < result.length) {
                        target.innerHTML += result.charAt(i);
                        i++;
                        display.scrollTop = display.scrollHeight;
                        setTimeout(type, 30);
                    }
                }
                type();

            } catch (e) {
                document.getElementById('typingStatus').style.display = 'none';
            }
        }
    </script>
</body>
</html>
