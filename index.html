<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111111">
    <title>صفاء الروح - مستشارك لتفسير الأحلام</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #FFD700;
            --dark-bg: #111;
            --card-bg: #1b1b1b;
            --card-bg-2: #262626;
            --text-white: #ffffff;
            --font-family: 'Almarai', sans-serif;
        }

        html, body {
            margin: 0; padding: 0; height: 100%;
            background: var(--dark-bg); font-family: var(--font-family);
            overflow: hidden;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .صفاء-الروح-master-container {
            display: flex; flex-direction: column; height: 100vh;
            max-width: 600px; margin: auto; background: var(--dark-bg);
        }

        .صفاء-الروح-header {
            padding: 20px; background: linear-gradient(145deg,#1c1c1c,#2a2a2a);
            border-bottom: 1px solid rgba(255,215,0,0.2); flex-shrink: 0;
        }

        .profile-wrapper { display: flex; align-items: center; justify-content: center; gap: 12px; }
        
        .profile-img-container {
            width: 60px; height: 60px; border-radius: 50%;
            border: 2px solid var(--gold); display: flex;
            align-items: center; justify-content: center; position: relative;
        }
        .profile-img-container i { color: var(--gold); font-size: 28px; }

        .online-indicator {
            position: absolute; bottom: 2px; right: 2px;
            width: 12px; height: 12px; background: #2ecc71;
            border-radius: 50%; border: 2px solid #1a1a1a;
        }

        .profile-name { color: var(--gold); font-weight: 800; font-size: 20px; text-align: right; }
        .profile-status { color: #2ecc71; font-size: 12px; text-align: right; }

        .صفاء-الروح-display-window {
            flex: 1; padding: 15px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
            scroll-behavior: smooth;
        }

        .صفاء-الروح-response-card {
            background: linear-gradient(145deg,var(--card-bg),var(--card-bg-2));
            border-radius: 20px; padding: 15px; max-width: 90%;
            text-align: right; position: relative; align-self: flex-start;
            border-right: 4px solid var(--gold); color: var(--text-white);
            animation: msgIn 0.35s ease;
        }
        .صفاء-الروح-response-card p { color: var(--text-white); line-height: 1.8; margin: 0; font-size: 15px; }

        .user-message {
            align-self: flex-end; background: linear-gradient(145deg,#1e3a5f,#27496d);
            color: #fff; border-left: 4px solid #4aa3ff; border-radius: 20px; 
            padding: 15px; max-width: 85%; text-align: right;
        }

        .bot-icon {
            position: absolute; top: -12px; left: -12px;
            background: #222; border: 1px solid var(--gold);
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .bot-icon i { color: var(--gold); font-size: 12px; }

        .صفاء-الروح-control-panel {
            background: #1a1a1a; padding: 15px;
            border-top: 1px solid rgba(255,215,0,0.1);
        }

        #dreamInput {
            width: 100%; height: 80px; background: #111;
            border: 1px solid #333; border-radius: 15px;
            color: #fff; padding: 12px; font-size: 15px;
            outline: none; resize: none; font-family: var(--font-family); text-align: right;
        }

        .صفاء-الروح-main-btn {
            width: 100%; margin-top: 10px; padding: 14px;
            border-radius: 15px; border: none; font-weight: bold;
            background: linear-gradient(145deg,#FFD700,#caa500);
            cursor: pointer; font-family: var(--font-family); color: #000;
        }

        .صفاء-الروح-status { 
            color: var(--gold); margin-bottom: 10px; display: none; 
            gap: 8px; justify-content: center; align-items: center; font-size: 14px; 
        }
        
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .صفاء-الروح-branding { text-align: center; margin-top: 10px; color: rgba(255,255,255,0.3); font-size: 10px; }
        .صفاء-الروح-branding span { color: var(--gold); }
    </style>
</head>
<body>

    <div class="صفاء-الروح-master-container">
        <div class="صفاء-الروح-header">
            <div class="profile-wrapper">
                <div class="profile-img-container">
                    <i class="fas fa-user"></i>
                    <div class="online-indicator"></div>
                </div>
                <div class="profile-info">
                    <span class="profile-name">صفاء الروح</span>
                    <span class="profile-status">متصل الآن</span>
                </div>
            </div>
        </div>

        <div class="صفاء-الروح-display-window" id="sabriDisplay">
            <div class="صفاء-الروح-response-card" style="border-right: 4px solid #444;">
                <p>مرحباً بك.. أنا مفسرك الخاص. اسرد حلمك هنا بوضوح، وسأقوم بتحليل رموزه بعمق لك.</p>
            </div>
        </div>

        <div class="صفاء-الروح-control-panel">
            <div id="sabriTyping" class="صفاء-الروح-status">
                <i class="fas fa-pen-fancy fa-spin"></i> جاري الكتابة...
            </div>
            <textarea id="dreamInput" placeholder="اكتب حلمك هنا بعمق..."></textarea>
            <button class="صفاء-al-روح-main-btn" onclick="startInterpretation()">إرسال الحلم للتفسير</button>
            <div class="صفاء-الروح-branding">هوية بصرية وبرمجة <span>sabriFX &copy; 2026</span></div>
        </div>
    </div>

    <script>
        const displayWindow = document.getElementById('sabriDisplay');
        const dreamInput = document.getElementById('dreamInput');
        const typingStatus = document.getElementById('sabriTyping');

        async function startInterpretation() {
            const text = dreamInput.value.trim();
            if (!text) return;

            const userCard = document.createElement('div');
            userCard.className = 'user-message';
            userCard.innerHTML = `<p>${text}</p>`;
            displayWindow.appendChild(userCard);
            
            dreamInput.value = '';
            displayWindow.scrollTop = displayWindow.scrollHeight;
            typingStatus.style.display = 'flex';

            try {
                // تحديد الجنس بناءً على الكلمات المفتاحية
                const gender = (text.match(/امي|اختي|بنت|شافت|رأت|زوجتي/)) ? "يا أختي" : "يا أخي";
                
                // البرومبت المطور للتعامل مع اللهجات والذكاء الفطني
                const systemPrompt = `أنت "صفاء الروح"، مفسر أحلام ذكي جداً وفطن. مهمتك استخلاص الرموز من كلام المستخدم مهما اختلفت طريقته في السرد (حلمت، شفت، رأيت، رأت، شاف، إلخ). استوعب اللهجات العامية وحللها بعمق. 
القواعد:
1- الرد بالعربية الفصحى فقط.
2- ابدأ بـ 'مرحبا ${gender}'.
3- قدم 4 نقاط: (1. التفسير الرمزي، 2. المعنى الواقعي، 3. نوع الرسالة، 4. نصيحة).
4- ممنوع استخدام الإنجليزية.`;
                
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(systemPrompt + " الحلم: " + text)}?model=openai`);
                const resultText = await response.text();

                setTimeout(() => {
                    typingStatus.style.display = 'none';
                    
                    const card = document.createElement('div');
                    card.className = 'صفاء-الروح-response-card';
                    card.innerHTML = '<div class="bot-icon"><i class="fas fa-user"></i></div><p id="typingTarget"></p>';
                    displayWindow.appendChild(card);

                    const target = card.querySelector('#typingTarget');
                    let cleanResult = resultText.replace(/[a-zA-Z]/g, '').trim();

                    let i = 0;
                    function typeEffect() {
                        if (i < cleanResult.length) {
                            target.innerHTML += cleanResult.charAt(i);
                            i++;
                            displayWindow.scrollTop = displayWindow.scrollHeight;
                            setTimeout(typeEffect, 30);
                        }
                    }
                    typeEffect();
                }, 8000); 

            } catch (e) {
                typingStatus.style.display = 'none';
                alert("حدث خطأ، حاول مجدداً.");
            }
        }
    </script>
</body>
</html>
